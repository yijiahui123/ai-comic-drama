# Video generation parameters for Wan2.1 via ComfyUI
video:
  model: "wan2.1-14b"        # Model name as registered in ComfyUI
  width: 1280                # Output video width (pixels)
  height: 720                # Output video height (pixels)
  fps: 8                     # Frames per second
  steps: 25                  # Diffusion sampling steps
  cfg: 6.0                   # Classifier-free guidance scale
  seed: -1                   # -1 = random seed per shot

# Fallback model when memory is constrained
fallback:
  model: "cogvideox-5b"
  width: 848
  height: 480
  fps: 8
  steps: 20
  cfg: 6.0
